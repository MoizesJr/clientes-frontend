<div class="container-fluid px-4"> <h1 class="mt-4">Clientes</h1>
  
  <ol class="breadcrumb mb-4">
    <li class="breadcrumb-item active">Consultas</li>
  </ol>

  <div class="row">
    <div class="col-md-12">
      <button class="btn btn-warning mb-4" (click)="novoCadastro()">
        <i class="fa fa-plus"></i> Novo
      </button>
    </div>
  </div>

  <div class="row">
    <div class="col-md-12">
      <table class="table table-condensed table-hover">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Data de Cadastro</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cliente of clientes">
            <td>{{ cliente.id }}</td>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.cpf }}</td>
            <td>{{ cliente.dataCadastro }}</td>
            <td>
              </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
